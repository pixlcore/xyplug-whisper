name: Publish Docker Images

on:
  pull_request:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: read
  packages: write

jobs:
  docker:
    name: Build ${{ matrix.model }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        model:
          - tiny
          - base
          - small
          - medium
          - large-v3

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and optionally push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          build-args: |
            WHISPER_MODEL=${{ matrix.model }}
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}-${{ matrix.model }}:${{ github.ref_name }}
          cache-from: type=gha,scope=xyplug-whisper-${{ matrix.model }}
          cache-to: type=gha,mode=max,scope=xyplug-whisper-${{ matrix.model }}
